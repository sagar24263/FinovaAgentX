<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="chat">
        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="chat-avatar">
                    <img src="/static/pb_logo.png" alt="">
                </div>
                <div class="chat-profile">
                    <h2>Finova AgentX</h2>
                    <span id="connection-status">● Connecting...</span>
                </div>
            </div>
            <button class="reset-btn" id="reset-btn">Reset Chat</button>
        </div>

        <!-- Body -->
        <div class="chat-body" id="chat-body">
            <div class="init-loader" id="init-loader">
                <div class="init-loader-dot"></div>
                <div class="init-loader-dot"></div>
                <div class="init-loader-dot"></div>
            </div>
        </div>

        <!-- Scroll-up typing indicator (shown when user scrolls up while bot is thinking) -->
        <div class="scroll-typing-indicator" id="scroll-typing-indicator">
            <div class="scroll-typing-dot"></div>
            <div class="scroll-typing-dot"></div>
            <div class="scroll-typing-dot"></div>
            <span>Finova AgentX is typing...</span>
        </div>

        <!-- Footer -->
        <div class="chat-footer">
            <input type="text" id="chat-input" placeholder="Type your message here..." disabled>
            <button class="send-btn" id="send-btn" disabled>➤</button>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('connection-status');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBody = document.getElementById('chat-body');
        const resetBtn = document.getElementById('reset-btn');
        const scrollTypingIndicator = document.getElementById('scroll-typing-indicator');

        const params = new URLSearchParams(window.location.search);
        const agentId = params.get("agentId") ?? params.get("agent_id");
        const productId = params.get("productId") ?? params.get("product_id");
        let uniqueId = null;
        let isBotTyping = false;
        let userHasScrolledUp = false;

        // ── Scroll tracking ──────────────────────────────────────────────────
        chatBody.addEventListener('scroll', () => {
            const distFromBottom = chatBody.scrollHeight - chatBody.scrollTop - chatBody.clientHeight;
            userHasScrolledUp = distFromBottom > 80;

            // Show/hide the sticky typing indicator when scrolled up and bot is typing
            if (isBotTyping && userHasScrolledUp) {
                scrollTypingIndicator.classList.add('visible');
            } else {
                scrollTypingIndicator.classList.remove('visible');
            }
        });

        // Clicking the indicator scrolls back down to the typing loader
        scrollTypingIndicator.addEventListener('click', () => {
            const typingLoader = document.getElementById('typing-loader');
            if (typingLoader) {
                typingLoader.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                chatBody.scrollTo({ top: chatBody.scrollHeight, behavior: 'smooth' });
            }
            scrollTypingIndicator.classList.remove('visible');
        });

        function setStatus(text, color, active = false) {
            statusEl.textContent = text;
            statusEl.style.color = color;
            statusEl.classList.toggle('active', active);
        }

        function disableChat() {
            chatInput.disabled = true;
            sendBtn.disabled = true;
            resetBtn.disabled = true;
        }

        function enableChat() {
            chatInput.disabled = false;
            sendBtn.disabled = false;
            resetBtn.disabled = false;
            chatInput.focus();
        }

        function showLoader() {
            const loader = document.createElement('div');
            loader.className = 'init-loader';
            loader.id = 'init-loader';
            loader.innerHTML = `
                <div class="init-loader-dot"></div>
                <div class="init-loader-dot"></div>
                <div class="init-loader-dot"></div>`;
            chatBody.appendChild(loader);
            chatBody.scrollTop = chatBody.scrollHeight;
            return loader;
        }

        function formatIST(timestamp) {
            const date = timestamp ? new Date(timestamp) : new Date();
            return date.toLocaleTimeString('en-IN', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: true,
                timeZone: 'Asia/Kolkata'
            });
        }

        function appendMessage(text, role, timestamp, silent = false) {
            const time = formatIST(timestamp);
            const content = role === 'agent' ? marked.parse(text) : text;
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerHTML = `
                <div class="bubble">
                    ${content}
                    <div class="time">${time}</div>
                </div>`;
            chatBody.appendChild(msg);

            if (silent) return;

            if (role === 'agent') {
                // Wait two frames: first for DOM paint, second for layout to settle
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    const PADDING = 16;
                    chatBody.scrollTo({ top: msg.offsetTop - PADDING, behavior: 'smooth' });
                }));
            } else {
                chatBody.scrollTop = chatBody.scrollHeight;
            }
        }

        async function initSession() {
            disableChat();
            chatBody.innerHTML = '';
            const loader = showLoader();

            if (!agentId || !productId) {
                loader.remove();
                setStatus('● Missing params', '#ff4d4d');
                appendMessage('Error: <b>agentId</b> and <b>productId</b> are required in the URL.<br>e.g. <code>/chat?agentId=124&productId=115</code>', 'agent');
                return;
            }

            setStatus('● Connecting...', 'rgba(255,255,255,.85)');

            try {
                const res = await fetch('/api/save-customer-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        UserId: agentId,
                        UserType: 'Agent',
                        UserSource: 'Finova AgentX',
                        ProductID: parseInt(productId, 10)
                    })
                });

                const data = await res.json();
                loader.remove();

                if (data.isSuccess) {
                    uniqueId = data.unique_id;
                    setStatus('● Active now', '#4cff91', true);

                    const messages = data.messages || [];
                    if (messages.length > 0) {
                        // Render all history silently, then snap to bottom
                        messages.forEach(m => {
                            const role = m.role === 'bot' ? 'agent' : 'user';
                            appendMessage(m.content, role, m.timestamp, true);
                        });
                        chatBody.scrollTop = chatBody.scrollHeight;
                    } else {
                        appendMessage('Hello! How can I help you today?', 'agent');
                    }

                    enableChat();
                } else {
                    const errors = (data.errors || ['Unknown error']).join(', ');
                    setStatus('● Failed', '#ff4d4d');
                    appendMessage(`Failed to connect: ${errors}`, 'agent');
                }
            } catch (err) {
                loader.remove();
                setStatus('● Offline', '#ff4d4d');
                appendMessage('Unable to reach the server. Please try again later.', 'agent');
            }
        }

        async function resetChat() {
            disableChat();
            setStatus('● Resetting...', 'rgba(255,255,255,.85)');

            try {
                await fetch('/api/reset-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        UserId: agentId,
                        ProductID: parseInt(productId, 10)
                    })
                });
            } catch (_) { }

            chatBody.innerHTML = '';

            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const countdownMsg = document.createElement('div');
            countdownMsg.className = 'message agent reconnecting';
            countdownMsg.innerHTML = `<div class="bubble reconnect-bubble"><span class="reconnect-text">Reconnecting in 2s...</span><div class="time">${now}</div></div>`;
            chatBody.appendChild(countdownMsg);
            chatBody.scrollTop = chatBody.scrollHeight;

            const reconnectText = countdownMsg.querySelector('.reconnect-text');
            setStatus('● Reconnecting in 2s...', '#ffcc00');

            let count = 2;
            await new Promise(resolve => {
                const interval = setInterval(() => {
                    count--;
                    if (count <= 0) {
                        clearInterval(interval);
                        reconnectText.textContent = 'Reconnecting now...';
                        setStatus('● Reconnecting...', '#ffcc00');
                        resolve();
                    } else {
                        reconnectText.textContent = `Reconnecting in ${count}s...`;
                        setStatus(`● Reconnecting in ${count}s...`, '#ffcc00');
                    }
                }, 1000);
            });

            await initSession();
        }

        function showTypingLoader() {
            isBotTyping = true;
            userHasScrolledUp = false;
            const loader = document.createElement('div');
            loader.id = 'typing-loader';
            loader.innerHTML = `
                <div class="chat-loader">
                    <div class="chat-loader-avatar"></div>
                    <div class="chat-loader-content">
                        <div class="chat-loader-line large"></div>
                        <div class="chat-loader-line"></div>
                        <div class="chat-loader-line small"></div>
                    </div>
                </div>`;
            chatBody.appendChild(loader);
            chatBody.scrollTop = chatBody.scrollHeight;
            return loader;
        }

        function removeTypingLoader(loader) {
            isBotTyping = false;
            scrollTypingIndicator.classList.remove('visible');
            loader.remove();
        }

        async function sendMessage() {
            const query = chatInput.value.trim();
            if (!query || !uniqueId) return;

            chatInput.value = '';
            disableChat();
            appendMessage(query, 'user');

            const loader = showTypingLoader();

            try {
                const res = await fetch('/api/get-faq-response', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, uniqueId })
                });

                const data = await res.json();
                removeTypingLoader(loader);

                if (data.isSuccess) {
                    appendMessage(data.answer, 'agent');
                } else {
                    const errors = (data.errors || ['Unknown error']).join(', ');
                    appendMessage(`Sorry, something went wrong: ${errors}`, 'agent');
                }
            } catch (err) {
                removeTypingLoader(loader);
                appendMessage('Unable to reach the server. Please try again.', 'agent');
            }

            enableChat();
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
        resetBtn.addEventListener('click', resetChat);

        initSession();
    </script>
</body>

</html>
